<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bouncing Ball with Blocks (JS)</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      text-align: center;
    }
    #gameCanvas {
      background: #202020;
      border: 2px solid #444;
      display: block;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <h1>Bouncing Ball with Blocks</h1>
  <p>
    Gravity auto-flips every 1 minute for 15 seconds. Click the ball to boost toward points.
    P = pause.
  </p>

  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let WIDTH = canvas.width;
    let HEIGHT = canvas.height;

    let x, y, dx, dy;
    const radius = 30;

    const baseGravity = 0.3;
    let gravityDirection = 1; // 1 = down, -1 = anti (up)

    const floorBounce = 0.85;
    const ceilingBounce = 0.3;
    const clickStrength = 14;

    let score = 0;
    let paused = false;
    let gameOver = false;

    const NUM_BLOCKS = 8;
    const BLOCK_HITS_TO_BREAK = 3;
    const blockHeight = 30;

    const GREEN = { r: 80, g: 180, b: 80 };
    const OUTLINE = "#143c14";

    const NORMAL_DURATION = 1 * 60 * 1000;
    const FLIPPED_DURATION = 15 * 1000;
    let stateStartTime = performance.now();

    function makeRow(yPos) {
      const blocks = [];
      const blockWidth = WIDTH / NUM_BLOCKS;
      for (let i = 0; i < NUM_BLOCKS; i++) {
        blocks.push({
          x: i * blockWidth,
          y: yPos,
          w: blockWidth,
          h: blockHeight,
          hits: 0,
          alive: true,
          alpha: 1.0
        });
      }
      return blocks;
    }

    let topBlocks, bottomBlocks;

    function resetBlock(block) {
      block.hits = 0;
      block.alive = true;
      block.alpha = 1.0;
    }

    function resetGame() {
      x = 200;
      y = 150;
      dx = 4;
      dy = 0;
      score = 0;
      gravityDirection = 1;
      topBlocks = makeRow(0);
      bottomBlocks = makeRow(HEIGHT - blockHeight);
      stateStartTime = performance.now();
      paused = false;
      gameOver = false;
    }

    resetGame();

    function onResize() {
      const rect = canvas.getBoundingClientRect();
      WIDTH = rect.width;
      HEIGHT = rect.height;
      canvas.width = WIDTH;
      canvas.height = HEIGHT;
      // rebuild rows with fresh size
      topBlocks = makeRow(0);
      bottomBlocks = makeRow(HEIGHT - blockHeight);
    }

    window.addEventListener("resize", onResize);

    canvas.addEventListener("mousedown", (e) => {
      if (gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const dist = Math.hypot(mx - x, my - y);
      if (dist <= radius) {
        if (gravityDirection === 1) {
          dy = -clickStrength;
        } else {
          dy = clickStrength;
        }
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "p" || e.key === "P") {
        paused = !paused;
      } else if ((e.key === "r" || e.key === "R") && gameOver) {
        resetGame();
      }
    });

    let lastTime = performance.now();

    function getBlockIndex() {
      const blockWidth = WIDTH / NUM_BLOCKS;
      return Math.floor(x / blockWidth);
    }

    function getBlock(blocks, idx) {
      if (idx < 0 || idx >= NUM_BLOCKS) return null;
      return blocks[idx];
    }

    function update(dt) {
      if (paused || gameOver) return;

      const now = performance.now();
      const elapsedState = now - stateStartTime;

      // auto flip gravity
      if (gravityDirection === 1 && elapsedState >= NORMAL_DURATION) {
        gravityDirection = -1;
        stateStartTime = now;
      } else if (gravityDirection === -1 && elapsedState >= FLIPPED_DURATION) {
        gravityDirection = 1;
        stateStartTime = now;
      }

      const gravity = baseGravity * gravityDirection;
      dy += gravity;
      x += dx;
      y += dy;

      // side walls
      if (x - radius <= 0) {
        x = radius;
        dx = -dx;
      } else if (x + radius >= WIDTH) {
        x = WIDTH - radius;
        dx = -dx;
      }

      const idx = getBlockIndex();
      const bottomY = HEIGHT - blockHeight;

      if (gravityDirection === 1) {
        // NORMAL GRAVITY (down)
        // bottom = minus side (damage, can die)
        if (y + radius >= bottomY) {
          const block = getBlock(bottomBlocks, idx);
          if (block && block.alive) {
            y = block.y - radius;
            dy = -dy * floorBounce;

            block.hits += 1;
            block.alpha = Math.max(0, 1.0 - block.hits / BLOCK_HITS_TO_BREAK);
            if (block.hits >= BLOCK_HITS_TO_BREAK) block.alive = false;

            score -= 5;
            if (score < 0) score = 0;
          } else {
            // gap on minus side = game over
            gameOver = true;
          }
        }

        // top = plus side (points, no damage)
        if (y - radius <= blockHeight) {
          const block = getBlock(topBlocks, idx);
          if (block && block.alive) {
            y = block.y + block.h + radius;
          } else {
            y = blockHeight + radius;
          }
          dy = -dy * ceilingBounce;
          score += 50;
        }

      } else {
        // ANTI-GRAVITY (up)
        // top = minus side (damage, can die)
        if (y - radius <= blockHeight) {
          const block = getBlock(topBlocks, idx);
          if (block && block.alive) {
            y = block.y + block.h + radius;
            dy = -dy * floorBounce;

            block.hits += 1;
            block.alpha = Math.max(0, 1.0 - block.hits / BLOCK_HITS_TO_BREAK);
            if (block.hits >= BLOCK_HITS_TO_BREAK) block.alive = false;

            score -= 5;
            if (score < 0) score = 0;
          } else {
            gameOver = true;
          }
        }

        // bottom = repair side (hit to fix, never disappears)
        if (y + radius >= bottomY && dy > 0) {
          const block = getBlock(bottomBlocks, idx);
          if (block) {
            y = block.y - radius;
            dy = -dy * ceilingBounce;
            resetBlock(block); // fix this column
          } else {
            y = bottomY - radius;
            dy = -dy * ceilingBounce;
          }
        }
      }
    }

    function drawBlocks(blocks) {
      for (const b of blocks) {
        if (!b.alive) continue;
        ctx.save();
        ctx.globalAlpha = b.alpha;
        ctx.fillStyle = `rgb(${GREEN.r},${GREEN.g},${GREEN.b})`;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.restore();
        ctx.strokeStyle = OUTLINE;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);
      ctx.fillStyle = "#202020";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      drawBlocks(topBlocks);
      drawBlocks(bottomBlocks);

      // ball
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = "rgb(255,120,120)";
      ctx.fill();
      ctx.closePath();

      // text
      ctx.fillStyle = "#ffffff";
      ctx.font = "20px sans-serif";
      const status = gravityDirection === 1 ? "DOWN" : "UP (anti)";
      ctx.fillText(`Score: ${score}`, 10, 24);
      ctx.fillText(`Gravity: ${status}`, 10, 48);
      ctx.fillText(`P = pause`, 10, 72);

      if (paused && !gameOver) {
        ctx.font = "32px sans-serif";
        ctx.fillText("PAUSED", WIDTH / 2 - 60, HEIGHT / 2);
      }

      if (gameOver) {
        ctx.font = "40px sans-serif";
        ctx.fillStyle = "#ff5050";
        ctx.fillText("GAME OVER", WIDTH / 2 - 120, HEIGHT / 2);
        ctx.font = "24px sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.fillText("Press R to restart", WIDTH / 2 - 110, HEIGHT / 2 + 40);
      }
    }

    function loop(timestamp) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
