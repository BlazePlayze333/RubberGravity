<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bouncing Ball with Blocks (JS)</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      text-align: center;
    }
    #gameCanvas {
      background: #202020;
      border: 2px solid #444;
      display: block;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <h1>Bouncing Ball with Blocks</h1>
  <p>Gravity auto-flips every 3 minutes for 15 seconds. Click the ball to boost toward points.</p>

  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let WIDTH = canvas.width;
    let HEIGHT = canvas.height;

    let x = 200;
    let y = 150;
    let dx = 4;
    let dy = 0;
    const radius = 30;

    const baseGravity = 0.3;
    let gravityDirection = 1; // 1 = down, -1 = anti (up)

    const floorBounce = 0.85;
    const ceilingBounce = 0.3;
    const clickStrength = 14;

    let score = 0;

    const NUM_BLOCKS = 8;
    const BLOCK_HITS_TO_BREAK = 3;
    const blockHeight = 30;

    const GREEN = { r: 80, g: 180, b: 80 };
    const OUTLINE = "#143c14";

    // 3 minutes normal, 15 seconds anti (ms)
    const NORMAL_DURATION = 3 * 60 * 1000;
    const FLIPPED_DURATION = 15 * 1000;
    let stateStartTime = performance.now();

    function makeRow(yPos) {
      const blocks = [];
      const blockWidth = WIDTH / NUM_BLOCKS;
      for (let i = 0; i < NUM_BLOCKS; i++) {
        blocks.push({
          x: i * blockWidth,
          y: yPos,
          w: blockWidth,
          h: blockHeight,
          hits: 0,
          alive: true,
          alpha: 1.0
        });
      }
      return blocks;
    }

    let topBlocks = makeRow(0);
    let bottomBlocks = makeRow(HEIGHT - blockHeight);

    function resetBlock(block) {
      block.hits = 0;
      block.alive = true;
      block.alpha = 1.0;
    }

    function onResize() {
      const rect = canvas.getBoundingClientRect();
      WIDTH = rect.width;
      HEIGHT = rect.height;
      canvas.width = WIDTH;
      canvas.height = HEIGHT;
      topBlocks = makeRow(0);
      bottomBlocks = makeRow(HEIGHT - blockHeight);
    }

    window.addEventListener("resize", onResize);

    canvas.addEventListener("mousedown", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const dist = Math.hypot(mx - x, my - y);
      if (dist <= radius) {
        if (gravityDirection === 1) {
          dy = -clickStrength;   // toward top (points)
        } else {
          dy = clickStrength;    // toward bottom (repair/points side)
        }
      }
    });

    let lastTime = performance.now();

    function getBlockIndex() {
      const blockWidth = WIDTH / NUM_BLOCKS;
      return Math.floor(x / blockWidth);
    }

    function getBlock(blocks, idx) {
      if (idx < 0 || idx >= NUM_BLOCKS) return null;
      return blocks[idx];
    }

    function update(dt) {
      const now = performance.now();
      const elapsedState = now - stateStartTime;

      // auto flip: 3 min normal, 15 sec anti
      if (gravityDirection === 1 && elapsedState >= NORMAL_DURATION) {
        gravityDirection = -1;
        stateStartTime = now;
      } else if (gravityDirection === -1 && elapsedState >= FLIPPED_DURATION) {
        gravityDirection = 1;
        stateStartTime = now;
      }

      const gravity = baseGravity * gravityDirection;
      dy += gravity;
      x += dx;
      y += dy;

      // walls
      if (x - radius <= 0) {
        x = radius;
        dx = -dx;
      } else if (x + radius >= WIDTH) {
        x = WIDTH - radius;
        dx = -dx;
      }

      const idx = getBlockIndex();
      const bottomY = HEIGHT - blockHeight;

      if (gravityDirection === 1) {
        // NORMAL GRAVITY: down
        // bottom = minus side (blocks damaged)
        if (y + radius >= bottomY) {
          const block = getBlock(bottomBlocks, idx);
          if (block && block.alive) {
            y = block.y - radius;
            dy = -dy * floorBounce;

            block.hits += 1;
            block.alpha = Math.max(0, 1.0 - block.hits / BLOCK_HITS_TO_BREAK);
            if (block.hits >= BLOCK_HITS_TO_BREAK) block.alive = false;

            score -= 5;
            if (score < 0) score = 0;
          } else {
            // gap on minus side = game over (simple: stop ball)
            dy = 0;
            dx = 0;
          }
        }

        // top = plus side (points, no damage)
        if (y - radius <= blockHeight) {
          const block = getBlock(topBlocks, idx);
          if (block && block.alive) {
            y = block.y + block.h + radius;
            dy = -dy * ceilingBounce;
            score += 50;
          } else {
            y = blockHeight + radius;
            dy = -dy * ceilingBounce;
            score += 50;
          }
        }

      } else {
        // ANTI-GRAVITY: up
        // top = minus side (blocks damaged)
        if (y - radius <= blockHeight) {
          const block = getBlock(topBlocks, idx);
          if (block && block.alive) {
            y = block.y + block.h + radius;
            dy = -dy * floorBounce;

            block.hits += 1;
            block.alpha = Math.max(0, 1.0 - block.hits / BLOCK_HITS_TO_BREAK);
            if (block.hits >= BLOCK_HITS_TO_BREAK) block.alive = false;

            score -= 5;
            if (score < 0) score = 0;
          } else {
            dy = 0;
            dx = 0;
          }
        }

        // bottom = repair side (must hit to fix, no points)
        if (y + radius >= bottomY && dy > 0) {
          const block = getBlock(bottomBlocks, idx);
          if (block) {
            y = block.y - radius;
            dy = -dy * ceilingBounce;
            resetBlock(block);
          } else {
            y = bottomY - radius;
            dy = -dy * ceilingBounce;
          }
        }
      }
    }

    function drawBlocks(blocks) {
      for (const b of blocks) {
        if (!b.alive) continue;
        ctx.save();
        ctx.globalAlpha = b.alpha;
        ctx.fillStyle = `rgb(${GREEN.r},${GREEN.g},${GREEN.b})`;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.restore();

        ctx.strokeStyle = OUTLINE;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);
      ctx.fillStyle = "#202020";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      drawBlocks(topBlocks);
      drawBlocks(bottomBlocks);

      // ball
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = "rgb(255,120,120)";
      ctx.fill();
      ctx.closePath();

      ctx.fillStyle = "#ffffff";
      ctx.font = "20px sans-serif";
      const status = gravityDirection === 1 ? "DOWN" : "UP (anti)";
      ctx.fillText(`Score: ${score}`, 10, 24);
      ctx.fillText(`Gravity: ${status}`, 10, 48);
    }

    function loop(timestamp) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
